<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      width: 100%;
      min-height: 100vh;
      background-color: #D5E1EF;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Outfit;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      border-radius: 15px;
      background-color: white;
      box-shadow: 0px 0px 26px -7px #000000;
      padding: 24px 16px;
    }

    .img-container {
      width: 100%;
    }

    .card-img {
      width: 100%;
      display: block;
      margin: 0 0 16px 0;
      border-radius: 10px;
    }

    .card-title {
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    .card-text {
      font-weight: 400;
      margin: 0; 
      color: hsl(218, 44%, 22%);
    }
    @media (max-width: 375px) {
      .card {
        padding: 16px;
      }
  
    .card-title {
      font-size: 20px;
    }
  }
  </style>
</head>
<body>
  <div class="card">
    <div class="img-container">
      <img src="images/image-qr-code.png" alt="qr-code" class="card-img">
    </div>
    <h2 class="card-title">Improve your front-end skills by building projects</h2>
    <p class="card-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</body>
</html>
